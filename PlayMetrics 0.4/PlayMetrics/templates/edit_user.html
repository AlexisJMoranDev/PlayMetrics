{% extends "base.html" %} {% block title %}Editar Usuario{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-body">

                    <h3 class="text-center mb-4">Editar datos</h3>

                    <form method="POST">

                        <div class="form-group mb-3">
                            <label>Correo Electrónico</label>
                            <input type="email" class="form-control" name="email" value="{{ user.email }}" required>
                        </div>

                        <div class="form-group mb-3">
                            <label>Usuario</label>
                            <input type="text" class="form-control" name="first_name" value="{{ user.first_name }}" required>
                        </div>

                        <!-- avatar -->
                        <div class="mb-3">
                            <label class="form-label">Selecciona tu avatar</label>
                            <div class="d-flex justify-content-between">

                                <label>
                                    <input type="radio" name="avatar" value="avatar1.png"
                                        {% if user.avatar == 'avatar1.png' %}checked{% endif %}>
                                    <img src="{{ url_for('static', filename='avatars/avatar1.png') }}"
                                        width="80" class="rounded-circle">
                                </label>

                                <label>
                                    <input type="radio" name="avatar" value="avatar2.png"
                                        {% if user.avatar == 'avatar2.png' %}checked{% endif %}>
                                    <img src="{{ url_for('static', filename='avatars/avatar2.png') }}"
                                        width="80" class="rounded-circle">
                                </label>

                                <label>
                                    <input type="radio" name="avatar" value="avatar3.png"
                                        {% if user.avatar == 'avatar3.png' %}checked{% endif %}>
                                    <img src="{{ url_for('static', filename='avatars/avatar3.png') }}"
                                        width="80" class="rounded-circle">
                                </label>

                            </div>
                        </div>

                        <div class="form-group mb-3">
                            <label>Nueva Contraseña</label>
                            <input type="password" class="form-control" name="new_password" placeholder="Ingresa tu nueva Contraseña">
                        </div>

                        <div class="form-group mb-3">
                            <label>Confirmar la nueva Contraseña</label>
                            <input type="password" class="form-control" name="confirm_password" placeholder="Vuelve a ingresar tu Contraseña">
                        </div>

                        <div class="form-group mb-3">
                            <label>Ingresa tu Contraseña, <br>para confirmar los cambios</label>
                            <input type="password" class="form-control" name="current_password" placeholder="Ingresa tu actual Contraseña" required>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('auth.user_profile') }}" class="btn btn-secondary">Cancelar</a>

                            <button type="submit" class="btn btn-primary">
                                Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
