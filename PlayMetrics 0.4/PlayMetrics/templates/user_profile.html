{% extends "base.html" %} {% block title %}User{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-body">

                    <!-- Perfil de usuario -->
                    <h3 class="text-center mb-4">Datos del usuario</h3>

                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='avatars/' + user.avatar) }}"
                            class="rounded-circle shadow"
                            width="120" height="120">
                    </div>

                    <div class="form-group-mb-3">
                        <label>Correo Electrónico</label>
                        <input type="email" class="form-control" value="{{ user.email }}" disabled>
                    </div>

                    <div class="form-group mb-4">
                        <label>Usuario</label>
                        <input type="text" class="form-control" value="{{ user.first_name }}" disabled>
                    </div>
                    
                    <!-- Botón para modificar datos -->
                    <div class="d-grid">
                        <a href="{{ url_for('auth.edit_user') }}" class="btn btn-primary">Editar Datos</a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
