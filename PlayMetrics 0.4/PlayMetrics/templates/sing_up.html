{% extends "base.html" %} {% block title %}Sign Up{% endblock %}{% block 
content %}
<form method="POST">
    
    <!-- Formulario para registrar usuario -->
    <h3 align="center">Registrate en nuestra web</h3>
    <div class="form-group">
        <label for="email">Direccion de correo</label>
        <input 
        type="email" 
        class="form-control" 
        id="email" 
        name="email" 
        placeholder="Ingresa tu correo electronico"
    />
    </div>
    <div class="form-group">
        <label for="firstName">Nombre de usuario</label>
        <input 
        type="text" 
        class="form-control" 
        id="firstName" 
        name="firstName" 
        placeholder="Ingresa tu usuario"
    />
    </div>
    <div class="form-group">
        <label for="password1">Contraseña</label>
        <input 
        type="password" 
        class="form-control" 
        id="password1" 
        name="password1" 
        placeholder="La contraseña debe ser mayor a 7 caracteres, incluir una letra, un número y un símbolo(#, @, $, /, -)"
    />
    </div>
    <div class="form-group">
        <label for="password2">Confirma tu contraseña (Confirma tu contraseña)</label>
        <input 
        type="password" 
        class="form-control" 
        id="password2" 
        name="password2" 
        placeholder="Confirma tu contraseña"
    />
    </div>
    <br>
    <button type="submit" class="btn btn-primary">Guardar</button>
</form>
{% endblock %}
